# Source: https://github.com/projectdiscovery/nuclei-templates/blob/main/http/misconfiguration/directory-listing.yaml
# Modified: 收敛 matcher

id: directory-listing

info:
  name: Directory Listing Enabled
  author: pdteam, internal-audit
  severity: low
  description: Detects enabled directory listing on web server.
  metadata:
    max-request: 1
  tags: http,exposure,misconfig,internal-audit,safe

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "Index of /"
          - "Directory Listing"
        condition: or
