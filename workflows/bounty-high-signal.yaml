id: bounty-high-signal

info:
  name: Bounty High-Signal Scan
  author: anchor
  description: |
    High-signal workflow for SRC bounty programs.
    Only includes templates with high confidence and low noise.
    Use with src_low_noise scan mode for best results.
  tags: workflow,bounty,high-signal,src

workflows:
  - template: http/technologies/springboot-actuator.yaml
    subtemplates:
      - template: http/misconfiguration/springboot/springboot-env.yaml
      - template: http/misconfiguration/springboot/springboot-heapdump.yaml
      - template: http/misconfiguration/springboot/springboot-mappings.yaml
      - template: http/misconfiguration/springboot/springboot-jolokia.yaml
  - template: http/technologies/docker-registry-browser-detect.yaml
    subtemplates:
      - template: http/misconfiguration/docker-registry.yaml
  - template: http/misconfiguration/exposed-docker-api.yaml
    subtemplates:
      - template: http/misconfiguration/docker-daemon-exposed.yaml
  - template: http/technologies/kubernetes/kube-api/kube-api-version.yaml
    subtemplates:
      - template: RBKD-templates/http/exposures/kubernetes-api-unauth.yaml
  - template: http/technologies/kubernetes/etcd/etcd-version.yaml
    subtemplates:
      - template: RBKD-templates/http/exposures/etcd-unauth.yaml
  - template: http/exposed-panels/hashicorp-consul-agent.yaml
    subtemplates:
      - template: RBKD-templates/http/exposures/consul-unauth.yaml
  - template: http/technologies/jolokia-detect.yaml
    subtemplates:
      - template: http/vulnerabilities/spring/jolokia-logback-jndi-rce.yaml
  - template: http/exposed-panels/prometheus-exposed-panel.yaml
    subtemplates:
      - template: http/exposures/configs/prometheus-metrics.yaml
