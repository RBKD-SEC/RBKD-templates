id: internal-full-safe

info:
  name: Internal Full Safe Scan
  author: internal-audit
  description: |
    Default safe scan workflow for internal network auditing.
    Runs fingerprinting first, then triggers only safe (read-only, no-login) risk templates.
    Does NOT include optional (brute-force / login-attempt) templates.
  tags: workflow,internal-audit,safe

workflows:
  - tags: fingerprint,internal-audit
  - tags: safe,internal-audit
